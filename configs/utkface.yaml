# Configuration for UTKFace age estimation experiments

project:
  name: QGFace-LLaVA
  task: age_estimation
  dataset: UTKFace

data:
  root: data/UTKFace
  train_size: 1600
  val_size: 400
  image_size: 224
  num_workers: 4

metadata:
  use_metadata: true
  fields:
    - age
    - gender
    - age_confidence
    - gender_confidence
    - availability
  settings:
    - clean
    - noisy60
    - missing
    - shuffled

model:
  method: qgface_llava
  visual_backbone: facellava
  fusion_type: quality_aware_controlled_fusion
  preserve_visual_dominance: true

training:
  epochs: 20
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.00001
  seed: 42

loss:
  task_loss: mae
  gate_regularization: true
  visual_preservation: true
  lambda_gate: 0.01
  lambda_visual: 0.01

evaluation:
  metric: MAE
  lower_is_better: true
  save_predictions: true

output:
  save_dir: outputs/utkface
  log_file: outputs/utkface/train_log.txt
  prediction_file: outputs/utkface/predictions.csv
